name: myridedriverapp
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.4
  get: ^4.7.3
  http: ^1.6.0
  google_places_flutter: ^2.1.1
  intl_phone_field: ^3.2.0
  image_picker: ^1.2.1
  sms_autofill: ^2.4.1
  pinput: ^6.0.2
  intl: ^0.20.2
  google_maps_flutter: ^2.14.2
  geolocator: ^14.0.2
  permission_handler: ^12.0.1
  fl_chart: ^1.2.0
  lottie: ^3.3.2
  table_calendar: ^3.2.0
  audioplayers: ^6.6.0
  flutter_polyline_points: ^3.1.0
  url_launcher: ^6.3.2
  flutter_launcher_icons: ^0.14.4
  flutter_easyloading: ^3.0.5
  firebase_messaging: ^16.1.3
  firebase_auth: ^6.3.0
  firebase_core: ^4.6.0
  device_info_plus: ^12.4.0
  flutter_image_compress: ^2.4.0
  flutter_html: ^3.0.0
  photo_view: ^0.15.0
  google_sign_in: ^6.1.5
  flutter_local_notifications: ^20.1.0
  path_provider: ^2.1.5
  path: ^1.9.1
  flutter_spinkit: ^5.2.2
  qr_flutter: ^4.1.0
  razorpay_flutter: ^1.3.7
  # flutter_facebook_auth: ^7.1.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter_icons:
  image_path: "assets/images/applogo.png"
  android: true
  ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/sound/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-ExtraBold.ttf
          weight: 800